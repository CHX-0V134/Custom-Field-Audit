<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f141a" />
  <title>Field Audit</title>
  <script>try { document.documentElement.dataset.theme = localStorage.getItem("audit_theme") || "dark"; } catch (e) {}</script>
  <link rel="stylesheet" href="styles.css?v=6" />
</head>
<body>
  <!-- LOGIN -->
  <div id="login-view" class="login-screen" hidden>
    <div class="login-card">
      <div class="brand">
        <div class="brand-mark">FA</div>
        <div>
          <h1>Field Audit</h1>
          <p>Injection point inspections</p>
        </div>
      </div>
      <label class="field">
        <span>Email</span>
        <input type="email" id="login-email" placeholder="you@championx.com" autocomplete="email" inputmode="email" />
      </label>
      <button type="button" id="login-btn" class="btn-primary">Continue</button>
      <p id="login-status" class="hint"></p>
    </div>
  </div>

  <!-- APP -->
  <div id="app-shell" hidden>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="topbar-title">
          <span class="brand-mark sm">FA</span>
          <strong id="view-title">Dashboard</strong>
        </div>
        <div class="topbar-actions">
          <button type="button" id="theme-btn" class="icon-btn" title="Toggle light / dark" aria-label="Toggle theme"></button>
          <button type="button" id="signout-btn" class="chip" title="Sign out">
            <span id="user-email"></span>
            <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M16 17l5-5-5-5M21 12H9M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </header>

    <main>
      <!-- DASHBOARD -->
      <section id="dashboard-view" class="tab-view">
        <div class="view-head">
          <h2>Dashboard</h2>
          <button type="button" id="refresh-btn" class="ghost-btn">Refresh</button>
        </div>
        <div id="kpis" class="kpi-grid"></div>

        <div class="panel">
          <div class="panel-head"><h3>Needs attention</h3><span id="attention-count" class="muted"></span></div>
          <div id="attention"><p class="muted">Loading…</p></div>
        </div>

        <div class="panel">
          <div class="panel-head"><h3>Recent activity</h3></div>
          <div id="activity"><p class="muted">Loading…</p></div>
        </div>
      </section>

      <!-- AUDIT / VISIT -->
      <section id="audit-view" class="tab-view" hidden>
        <div class="view-head"><h2>New visit</h2></div>

        <div class="panel">
          <label class="field">
            <span>Account</span>
            <select id="account-select"><option value="">Loading…</option></select>
          </label>
          <label class="field">
            <span>Tank</span>
            <select id="tank-select" disabled><option value="">Select an account first</option></select>
          </label>
        </div>

        <div id="visit-view" hidden>
          <div class="panel">
            <div class="panel-head"><h3 id="tank-summary"></h3></div>
            <p class="auditor-line">Auditor: <strong id="auditor-display"></strong></p>
            <div id="tank-fields"></div>
          </div>

          <div class="panel">
            <div class="panel-head"><h3>Wells on this tank</h3><span id="wells-count" class="muted"></span></div>
            <div id="wells"></div>
          </div>

          <div class="panel">
            <label class="field">
              <span>General notes (optional)</span>
              <textarea id="general-notes" rows="2" placeholder="Anything else worth recording…"></textarea>
            </label>
            <div class="form-actions">
              <span id="form-status" class="hint"></span>
              <button type="button" id="save-btn" class="btn-primary">Save visit</button>
            </div>
          </div>

          <div class="panel">
            <div class="panel-head"><h3>Visit history</h3><span id="history-count" class="muted"></span></div>
            <div id="history"><p class="muted">Loading…</p></div>
          </div>
        </div>
      </section>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="tabbar">
      <button type="button" class="tab" data-tab="dashboard" aria-current="true">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" fill="currentColor"/></svg>
        <span>Dashboard</span>
      </button>
      <button type="button" class="tab" data-tab="audit">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2m-6 9l2 2 4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Audit</span>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js?v=6"></script>
  <script src="questions.js?v=6"></script>
  <script src="app.js?v=6"></script>
</body>
</html>
